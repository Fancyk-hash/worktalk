<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUA WorkTalk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { font-size: 28px; margin: 20px 0 5px; color: #00d4aa; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 20px; text-align: center; }
        .room-box {
            width: 100%;
            max-width: 400px;
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .room-label { font-size: 12px; color: #00d4aa; text-transform: uppercase; margin-bottom: 10px; }
        .room-input-row { display: flex; gap: 10px; }
        .room-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 25px;
            border: 2px solid #00d4aa;
            background: transparent;
            color: white;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
        }
        .room-input::placeholder { color: #555; letter-spacing: 2px; font-size: 14px; }
        .room-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            background: #00d4aa;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .room-status { font-size: 12px; color: #888; margin-top: 8px; text-align: center; }
        .lang-selector { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .lang-btn {
            padding: 12px 25px;
            border: 2px solid #00d4aa;
            background: transparent;
            color: white;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lang-btn.active { background: #00d4aa; color: #1a1a2e; font-weight: bold; }
        .talk-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #00d4aa;
            background: transparent;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px 0;
            -webkit-user-select: none;
            user-select: none;
        }
        .talk-btn.recording {
            background: #ff4444;
            border-color: #ff4444;
            animation: pulse 1s infinite;
        }
        .talk-btn.disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .silence-bar {
            width: 180px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }
        .silence-fill {
            height: 100%;
            background: #00d4aa;
            border-radius: 3px;
            transition: width 0.1s;
            width: 0%;
        }
        .status { font-size: 16px; color: #888; margin: 10px 0; min-height: 24px; text-align: center; }
        .result-box {
            width: 100%;
            max-width: 400px;
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            margin: 10px 0;
            display: none;
        }
        .result-box.show { display: block; }
        .result-label { font-size: 12px; color: #00d4aa; text-transform: uppercase; margin-bottom: 8px; }
        .result-text { font-size: 18px; line-height: 1.5; }
        .translated-text { font-size: 22px; color: #00d4aa; }
        .play-btn {
            display: none;
            margin-top: 15px;
            padding: 12px 30px;
            background: #00d4aa;
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .play-btn.show { display: block; }
    </style>
</head>
<body>
    <h1>CUA WorkTalk</h1>
    <p class="subtitle" id="subtitle">Real-time workplace translator</p>

    <!-- Room Box -->
    <div class="room-box">
        <div class="room-label" id="roomLabel">Join a Room</div>
        <div class="room-input-row">
            <input class="room-input" id="roomInput" maxlength="6" placeholder="ROOM CODE" />
            <button class="room-btn" onclick="joinRoom()" id="joinBtn">JOIN</button>
        </div>
        <div class="room-status" id="roomStatus">Enter a 6-letter code to connect with a colleague</div>
    </div>

    <div class="lang-selector">
        <button class="lang-btn active" onclick="setLang('en')" id="btn-en">
            English → Spanish
        </button>
        <button class="lang-btn" onclick="setLang('es')" id="btn-es">
            Spanish → English
        </button>
    </div>

    <button class="talk-btn disabled" id="talkBtn" onclick="toggleRecording()">
        JOIN ROOM FIRST
    </button>

    <div class="silence-bar" id="silenceBar">
        <div class="silence-fill" id="silenceFill"></div>
    </div>

    <div class="status" id="status">Join a room to start translating</div>

    <div class="result-box" id="originalBox">
        <div class="result-label" id="youSaidLabel">You said</div>
        <div class="result-text" id="originalText"></div>
    </div>

    <div class="result-box" id="translatedBox">
        <div class="result-label" id="translationLabel">Translation</div>
        <div class="result-text translated-text" id="translatedText"></div>
        <button class="play-btn" id="playBtn" onclick="playAudio()">
            ▶ Tap to Hear Translation
        </button>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let currentLang = 'en';
        let isRecording = false;
        let audioUrl = null;
        let currentRoom = null;
        let pollInterval = null;
        let silenceTimer = null;
        let audioContext = null;
        let silenceTimeout = 1500;

        const ui = {
            en: {
                subtitle: "Real-time workplace translator",
                joinRoom: "Join a Room",
                joinBtn: "JOIN",
                roomPlaceholder: "ROOM CODE",
                roomHint: "Enter a 6-letter code to connect with a colleague",
                tapToTalk: "TAP TO TALK",
                tapToStop: "LISTENING...",
                joinFirst: "JOIN ROOM FIRST",
                status: "Tap the button and speak — auto-stops when you finish",
                recording: "Listening... will auto-stop when you finish speaking",
                translating: "Translating...",
                done: "Done! Tap the green button to hear the translation",
                playing: "Playing translation...",
                ready: "Ready — tap to talk again",
                micError: "Please allow microphone access and try again",
                error: "Error. Please try again.",
                youSaid: "YOU SAID",
                translation: "TRANSLATION",
                playBtn: "▶ Tap to Hear Translation",
                joined: "Connected to room",
                waitJoin: "Join a room to start translating"
            },
            es: {
                subtitle: "Traductor en tiempo real para el trabajo",
                joinRoom: "Unirse a una Sala",
                joinBtn: "ENTRAR",
                roomPlaceholder: "CÓDIGO",
                roomHint: "Ingresa el código de 6 letras para conectarte",
                tapToTalk: "TOCA PARA HABLAR",
                tapToStop: "ESCUCHANDO...",
                joinFirst: "PRIMERO ÚNETE A UNA SALA",
                status: "Toca el botón y habla — para automáticamente al terminar",
                recording: "Escuchando... para automáticamente al terminar de hablar",
                translating: "Traduciendo...",
                done: "¡Listo! Toca el botón verde para escuchar",
                playing: "Reproduciendo traducción...",
                ready: "Listo — toca para hablar de nuevo",
                micError: "Por favor permite el micrófono e intenta de nuevo",
                error: "Error. Por favor intenta de nuevo.",
                youSaid: "DIJISTE",
                translation: "TRADUCCIÓN",
                playBtn: "▶ Toca para Escuchar",
                joined: "Conectado a la sala",
                waitJoin: "Únete a una sala para comenzar"
            }
        };

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            const t = ui[lang];
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('roomLabel').textContent = t.joinRoom;
            document.getElementById('joinBtn').textContent = t.joinBtn;
            document.getElementById('roomInput').placeholder = t.roomPlaceholder;
            document.getElementById('youSaidLabel').textContent = t.youSaid;
            document.getElementById('translationLabel').textContent = t.translation;
            document.getElementById('playBtn').textContent = t.playBtn;
            if (!currentRoom) {
                document.getElementById('roomStatus').textContent = t.roomHint;
                document.getElementById('status').textContent = t.waitJoin;
                document.getElementById('talkBtn').textContent = t.joinFirst;
            } else {
                document.getElementById('status').textContent = t.status;
                if (!isRecording) document.getElementById('talkBtn').textContent = t.tapToTalk;
            }
        }

        async function joinRoom() {
            const code = document.getElementById('roomInput').value.trim().toUpperCase();
            if (code.length < 2) {
                document.getElementById('roomStatus').textContent = 'Please enter a room code!';
                return;
            }
            currentRoom = code;
            const t = ui[currentLang];
            document.getElementById('roomStatus').textContent = t.joined + ': ' + code;
            document.getElementById('talkBtn').classList.remove('disabled');
            document.getElementById('talkBtn').textContent = t.tapToTalk;
            document.getElementById('status').textContent = t.status;
            document.getElementById('joinBtn').textContent = '✓';
            document.getElementById('joinBtn').style.background = '#1D9E75';

            // Start polling for translations from the other person
            startPolling();
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                if (isRecording) return;
                try {
                    const res = await fetch(`/room/${currentRoom}/latest`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.has_new && data.original) {
                            document.getElementById('originalText').textContent = data.original;
                            document.getElementById('translatedText').textContent = data.translated;
                            document.getElementById('originalBox').classList.add('show');
                            document.getElementById('translatedBox').classList.add('show');
                            audioUrl = `/room/${currentRoom}/audio?t=` + Date.now();
                            document.getElementById('playBtn').classList.add('show');
                            document.getElementById('status').textContent = ui[currentLang].done;
                            const audio = new Audio(audioUrl);
                            audio.play().catch(() => {});
                        }
                    }
                } catch(e) {}
            }, 2000);
        }

        function playAudio() {
            if (audioUrl) {
                const audio = new Audio(audioUrl);
                audio.play().catch(() => {});
            }
        }

        async function toggleRecording() {
            if (!currentRoom) return;
            const t = ui[currentLang];
            if (!isRecording) {
                try {
                    audioChunks = [];
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                    // Silence detection using Web Audio API
                    audioContext = new AudioContext();
                    const source = audioContext.createMediaStreamSource(stream);
                    const analyser = audioContext.createAnalyser();
                    analyser.fftSize = 512;
                    source.connect(analyser);
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);

                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.start();
                    isRecording = true;

                    document.getElementById('talkBtn').classList.add('recording');
                    document.getElementById('talkBtn').textContent = t.tapToStop;
                    document.getElementById('status').textContent = t.recording;
                    document.getElementById('silenceBar').style.display = 'block';
                    document.getElementById('playBtn').classList.remove('show');

                    // Silence detection loop
                    let silenceStart = null;
                    function checkSilence() {
                        if (!isRecording) return;
                        analyser.getByteFrequencyData(dataArray);
                        const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                        const isSilent = avg < 8;

                        if (isSilent) {
                            if (!silenceStart) silenceStart = Date.now();
                            const silenceDuration = Date.now() - silenceStart;
                            const pct = Math.min(100, (silenceDuration / silenceTimeout) * 100);
                            document.getElementById('silenceFill').style.width = pct + '%';
                            if (silenceDuration >= silenceTimeout) {
                                stopRecording();
                                return;
                            }
                        } else {
                            silenceStart = null;
                            document.getElementById('silenceFill').style.width = '0%';
                        }
                        requestAnimationFrame(checkSilence);
                    }
                    checkSilence();

                } catch (err) {
                    document.getElementById('status').textContent = t.micError;
                }
            } else {
                stopRecording();
            }
        }

        async function stopRecording() {
            if (!isRecording) return;
            const t = ui[currentLang];
            isRecording = false;
            mediaRecorder.stop();
            if (audioContext) { audioContext.close(); audioContext = null; }

            document.getElementById('talkBtn').classList.remove('recording');
            document.getElementById('talkBtn').textContent = t.tapToTalk;
            document.getElementById('status').textContent = t.translating;
            document.getElementById('silenceBar').style.display = 'none';
            document.getElementById('silenceFill').style.width = '0%';

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.webm');
                formData.append('lang', currentLang);
                formData.append('room', currentRoom);

                try {
                    const response = await fetch('/translate', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    document.getElementById('originalText').textContent = data.original;
                    document.getElementById('translatedText').textContent = data.translated;
                    document.getElementById('originalBox').classList.add('show');
                    document.getElementById('translatedBox').classList.add('show');
                    audioUrl = '/audio?t=' + Date.now();
                    document.getElementById('playBtn').classList.add('show');
                    document.getElementById('status').textContent = t.done;
                    const audio = new Audio(audioUrl);
                    audio.play().catch(() => {});
                } catch (error) {
                    document.getElementById('status').textContent = t.error;
                }
            };
        }
    </script>
</body>
</html>
