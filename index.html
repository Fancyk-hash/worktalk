<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUA WorkTalk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { font-size: 28px; margin: 20px 0 5px; color: #00d4aa; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 20px; text-align: center; }
        .room-box { width: 100%; max-width: 400px; background: #16213e; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .room-label { font-size: 12px; color: #00d4aa; text-transform: uppercase; margin-bottom: 10px; }
        .room-input-row { display: flex; gap: 10px; }
        .room-input { flex: 1; padding: 10px 15px; border-radius: 25px; border: 2px solid #00d4aa; background: transparent; color: white; font-size: 18px; letter-spacing: 4px; text-align: center; text-transform: uppercase; }
        .room-input::placeholder { color: #555; letter-spacing: 2px; font-size: 14px; }
        .room-btn { padding: 10px 20px; border-radius: 25px; border: none; background: #00d4aa; color: #1a1a2e; font-size: 14px; font-weight: bold; cursor: pointer; }
        .lang-selector { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .lang-btn { padding: 12px 25px; border: 2px solid #00d4aa; background: transparent; color: white; border-radius: 25px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        .lang-btn.active { background: #00d4aa; color: #1a1a2e; font-weight: bold; }
        .talk-btn { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #00d4aa; background: transparent; color: white; font-size: 16px; cursor: pointer; transition: all 0.3s; margin: 20px 0; -webkit-user-select: none; user-select: none; }
        .talk-btn.recording { background: #ff4444; border-color: #ff4444; animation: pulse 1s infinite; }
        .talk-btn.disabled { border-color: #444; color: #444; cursor: not-allowed; }
        @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
        .silence-bar { width: 180px; height: 6px; background: #333; border-radius: 3px; margin-top: -10px; margin-bottom: 15px; display: none; }
        .silence-fill { height: 100%; background: #00d4aa; border-radius: 3px; transition: width 0.1s; width: 0%; }
        .status { font-size: 15px; color: #888; margin: 10px 0; min-height: 24px; text-align: center; padding: 0 10px; }
        .result-box { width: 100%; max-width: 400px; background: #16213e; border-radius: 15px; padding: 20px; margin: 10px 0; display: none; }
        .result-box.show { display: block; }
        .result-label { font-size: 12px; color: #00d4aa; text-transform: uppercase; margin-bottom: 8px; }
        .result-text { font-size: 18px; line-height: 1.5; }
        .translated-text { font-size: 22px; color: #00d4aa; }
        .play-btn { display: none; margin-top: 15px; padding: 12px 30px; background: #00d4aa; color: #1a1a2e; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        .play-btn.show { display: block; }
        .room-status { font-size: 12px; color: #888; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
    <h1>CUA WorkTalk</h1>
    <p class="subtitle" id="subtitle">Real-time workplace translator</p>

    <div class="room-box">
        <div class="room-label" id="roomLabel">Join a Room</div>
        <div class="room-input-row">
            <input class="room-input" id="roomInput" maxlength="6" placeholder="ROOM CODE"/>
            <button class="room-btn" onclick="joinRoom()" id="joinBtn">JOIN</button>
        </div>
        <div class="room-status" id="roomStatus">Enter any code to connect with a colleague</div>
    </div>

    <div class="lang-selector">
        <button class="lang-btn active" onclick="setLang('en')" id="btn-en">English → Spanish</button>
        <button class="lang-btn" onclick="setLang('es')" id="btn-es">Spanish → English</button>
    </div>

    <button class="talk-btn disabled" id="talkBtn" onclick="toggleRecording()">JOIN ROOM FIRST</button>

    <div class="silence-bar" id="silenceBar">
        <div class="silence-fill" id="silenceFill"></div>
    </div>

    <div class="status" id="status">Join a room to start translating</div>

    <div class="result-box" id="originalBox">
        <div class="result-label" id="youSaidLabel">YOU SAID</div>
        <div class="result-text" id="originalText"></div>
    </div>

    <div class="result-box" id="translatedBox">
        <div class="result-label" id="translationLabel">TRANSLATION</div>
        <div class="result-text translated-text" id="translatedText"></div>
        <button class="play-btn" id="playBtn" onclick="playAudio()">▶ Tap to Hear</button>
    </div>

    <script>
        let mediaRecorder, audioChunks = [], currentLang = 'en';
        let isRecording = false, audioUrl = null;
        let currentRoom = null, pollInterval = null;
        let audioCtx = null, audioUnlocked = false;
        const silenceTimeout = 1500;

        const ui = {
            en: {
                subtitle: "Real-time workplace translator",
                joinRoom: "Join a Room", joinBtn: "JOIN",
                roomHint: "Enter any code to connect with a colleague",
                tapToTalk: "TAP TO\nTALK", tapToStop: "LISTENING...",
                joinFirst: "JOIN ROOM FIRST",
                status: "Tap the button and speak — stops automatically",
                recording: "Listening... stops when you finish speaking",
                translating: "Translating...",
                done: "Translation received!",
                ready: "Ready — tap to talk again",
                micError: "Please allow microphone access",
                error: "Error. Please try again.",
                youSaid: "YOU SAID", translation: "TRANSLATION",
                playBtn: "▶ Tap to Hear",
                waitJoin: "Join a room to start translating",
                connected: "🟢 Connected! Both must tap button once first."
            },
            es: {
                subtitle: "Traductor en tiempo real para el trabajo",
                joinRoom: "Unirse a una Sala", joinBtn: "ENTRAR",
                roomHint: "Ingresa el código para conectarte",
                tapToTalk: "TOCA PARA\nHABLAR", tapToStop: "ESCUCHANDO...",
                joinFirst: "ÚNETE A UNA SALA",
                status: "Toca el botón y habla — para automáticamente",
                recording: "Escuchando... para al terminar de hablar",
                translating: "Traduciendo...",
                done: "¡Traducción recibida!",
                ready: "Listo — toca para hablar de nuevo",
                micError: "Por favor permite el micrófono",
                error: "Error. Por favor intenta de nuevo.",
                youSaid: "DIJISTE", translation: "TRADUCCIÓN",
                playBtn: "▶ Toca para Escuchar",
                waitJoin: "Únete a una sala para comenzar",
                connected: "🟢 ¡Conectado! Ambos deben tocar el botón primero."
            }
        };

        // Unlock audio — call on ANY user interaction
        function unlockAudio() {
            if (audioUnlocked) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const buf = audioCtx.createBuffer(1, 1, 22050);
                const src = audioCtx.createBufferSource();
                src.buffer = buf;
                src.connect(audioCtx.destination);
                src.start(0);
                audioUnlocked = true;
            } catch(e) {}
        }

        async function playAudioUrl(url) {
            unlockAudio();
            try {
                const audio = new Audio(url);
                await audio.play();
                return audio;
            } catch(e) {
                document.getElementById('playBtn').classList.add('show');
            }
        }

        function setLang(lang) {
            unlockAudio();
            currentLang = lang;
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            const t = ui[lang];
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('roomLabel').textContent = t.joinRoom;
            document.getElementById('youSaidLabel').textContent = t.youSaid;
            document.getElementById('translationLabel').textContent = t.translation;
            document.getElementById('playBtn').textContent = t.playBtn;
            if (!currentRoom) {
                document.getElementById('roomStatus').textContent = t.roomHint;
                document.getElementById('status').textContent = t.waitJoin;
                document.getElementById('talkBtn').textContent = t.joinFirst;
                document.getElementById('joinBtn').textContent = t.joinBtn;
            } else if (!isRecording) {
                document.getElementById('talkBtn').textContent = t.tapToTalk;
            }
        }

        function joinRoom() {
            unlockAudio();
            const code = document.getElementById('roomInput').value.trim().toUpperCase();
            if (code.length < 2) { alert('Please enter a room code!'); return; }
            currentRoom = code;
            const t = ui[currentLang];

            document.getElementById('joinBtn').textContent = '✓';
            document.getElementById('joinBtn').style.background = '#1D9E75';
            document.getElementById('talkBtn').classList.remove('disabled');
            document.getElementById('talkBtn').textContent = t.tapToTalk;
            document.getElementById('status').textContent = t.status;
            document.getElementById('roomStatus').textContent = t.connected;

            // Poll every 2 seconds for new translations
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                if (isRecording) return;
                try {
                    const res = await fetch(`/room/${currentRoom}/latest`);
                    if (!res.ok) return;
                    const data = await res.json();
                    if (!data.has_new) return;

                    document.getElementById('originalText').textContent = data.original;
                    document.getElementById('translatedText').textContent = data.translated;
                    document.getElementById('originalBox').classList.add('show');
                    document.getElementById('translatedBox').classList.add('show');
                    document.getElementById('status').textContent = ui[currentLang].done;
// Vibrate phone to alert user
if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

                    audioUrl = `/room/${currentRoom}/audio?t=` + Date.now();
                    document.getElementById('playBtn').classList.add('show');
                    playAudioUrl(audioUrl);

                } catch(e) {}
            }, 1000);
        }

        function playAudio() {
            unlockAudio();
            if (audioUrl) playAudioUrl(audioUrl);
        }

        async function toggleRecording() {
            if (!currentRoom) return;
            unlockAudio();
            const t = ui[currentLang];
            if (!isRecording) {
                try {
                    audioChunks = [];
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const ac = new (window.AudioContext || window.webkitAudioContext)();
                    const source = ac.createMediaStreamSource(stream);
                    const analyser = ac.createAnalyser();
                    analyser.fftSize = 512;
                    source.connect(analyser);
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);

                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.start();
                    isRecording = true;

                    document.getElementById('talkBtn').classList.add('recording');
                    document.getElementById('talkBtn').textContent = t.tapToStop;
                    document.getElementById('status').textContent = t.recording;
                    document.getElementById('silenceBar').style.display = 'block';
                    document.getElementById('playBtn').classList.remove('show');

                    let silenceStart = null;
                    function checkSilence() {
                        if (!isRecording) return;
                        analyser.getByteFrequencyData(dataArray);
                        const avg = dataArray.reduce((a,b) => a+b, 0) / dataArray.length;
                        if (avg < 8) {
                            if (!silenceStart) silenceStart = Date.now();
                            const pct = Math.min(100, ((Date.now()-silenceStart)/silenceTimeout)*100);
                            document.getElementById('silenceFill').style.width = pct+'%';
                            if (Date.now()-silenceStart >= silenceTimeout) { stopRecording(); return; }
                        } else {
                            silenceStart = null;
                            document.getElementById('silenceFill').style.width = '0%';
                        }
                        requestAnimationFrame(checkSilence);
                    }
                    checkSilence();
                } catch(err) {
                    document.getElementById('status').textContent = t.micError;
                }
            } else {
                stopRecording();
            }
        }

        async function stopRecording() {
            if (!isRecording) return;
            const t = ui[currentLang];
            isRecording = false;
            mediaRecorder.stop();
            document.getElementById('talkBtn').classList.remove('recording');
            document.getElementById('talkBtn').textContent = t.tapToTalk;
            document.getElementById('status').textContent = t.translating;
            document.getElementById('silenceBar').style.display = 'none';
            document.getElementById('silenceFill').style.width = '0%';

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.webm');
                formData.append('lang', currentLang);
                formData.append('room', currentRoom);

                try {
                    const response = await fetch('/translate', { method: 'POST', body: formData });
                    const data = await response.json();
                    document.getElementById('originalText').textContent = data.original;
                    document.getElementById('translatedText').textContent = data.translated;
                    document.getElementById('originalBox').classList.add('show');
                    document.getElementById('translatedBox').classList.add('show');
                    audioUrl = '/audio?t=' + Date.now();
                    document.getElementById('playBtn').classList.add('show');
                    document.getElementById('status').textContent = t.ready;
                    playAudioUrl(audioUrl);
                } catch(error) {
                    document.getElementById('status').textContent = t.error;
                }
            };
        }
    </script>
</body>
</html>
